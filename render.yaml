{
  "name": "kemet-flights-backend",
  "env": "node",
  "buildCommand": "npm install && npx prisma generate && npm run build",
  "startCommand": "npx prisma db push && node dist/index.js",
  "envVars": [
    { "key": "NODE_ENV", "value": "production" },
    { "key": "DATABASE_URL", "fromDatabase": { "name": "kemet-postgres", "property": "connectionString" } },
    { "key": "JWT_SECRET", "generateValue": true },
    { "key": "JWT_REFRESH_SECRET", "generateValue": true },
    { "key": "DUFFEL_API_KEY", "sync": false },
    { "key": "DUFFEL_API_VERSION", "value": "v2" },
    { "key": "ALLOWED_ORIGINS", "sync": false }
  ]
}
