services:
  - type: web
    name: kemet-flights-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: NPM_CONFIG_PRODUCTION
        value: false
      - key: DATABASE_URL
        sync: false   # Enter your 100% free Neon.tech or Supabase connection string
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: DUFFEL_API_KEY
        sync: false   # must be entered manually
      - key: DUFFEL_API_VERSION
        value: v2
      - key: ALLOWED_ORIGINS
        value: https://kemet-flights.vercel.app
      - key: PORT
        value: 5000
