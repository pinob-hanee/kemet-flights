name: Kemet Luxury CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Quality Assurance & Building Verification
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Initialize Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: |
          backend/package-lock.json
          frontend/package-lock.json

    # Backend QA Pipeline
    - name: Install & Compile Backend Services
      run: |
        cd backend
        npm ci
        npx prisma generate
        npm run build

    # Frontend QA Pipeline
    - name: Install & Compile Frontend Web Client
      run: |
        cd frontend
        npm ci
        npm run build

  # Automated Docker Image Compilations
  docker-delivery:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Compile Backend Docker Image
      run: |
        docker build -t kemet-luxury-api:latest ./backend

    - name: Compile Frontend Nginx Docker Image
      run: |
        docker build -t kemet-luxury-client:latest ./frontend
